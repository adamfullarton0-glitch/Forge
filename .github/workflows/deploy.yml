name: Deploy to GitHub Pages

# Publishes the app to https://adamfullarton0-glitch.github.io/Forge/ on every
# push to the working branch. The build is base-pathed to /Forge/ and a 404.html
# (a copy of index.html) gives the SPA a deep-link fallback on GitHub Pages.
on:
  push:
    branches: ['claude/nifty-curie-lasmwh', 'main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push supersede an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Auto-enables Pages (build_type=workflow) if it isn't already on.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build (sub-path for the project site)
        run: npm run build
        env:
          BASE_PATH: /Forge/
      - name: SPA deep-link fallback
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
